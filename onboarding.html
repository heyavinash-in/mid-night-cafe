<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Café - Setup Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Midnight Café">
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="padding: 32px 24px;">
            <h2 style="font-size: 24px; margin-bottom: 8px;">Complete your profile</h2>
            <p class="subtitle" style="margin-bottom: 24px;">Choose an avatar and a unique username.</p>
            
            <div id="onboardingForm">
                <div class="avatar-selection" style="display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
                    <div class="avatar-option selected" data-avatar="🦊">🦊</div>
                    <div class="avatar-option" data-avatar="🐱">🐱</div>
                    <div class="avatar-option" data-avatar="🐶">🐶</div>
                    <div class="avatar-option" data-avatar="🐼">🐼</div>
                    <div class="avatar-option" data-avatar="🐰">🐰</div>
                </div>
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. nightowl99" required autocomplete="off">
                </div>
                
                <div id="errorDisplay" style="color: #ef4444; font-size: 14px; margin-bottom: 12px; display: none;"></div>
                
                <button type="button" id="saveBtn" class="login-button">Join the Café</button>
            </div>
        </div>
    </div>
    
    <style>
        .avatar-option {
            width: 48px;
            height: 48px;
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .avatar-option:hover {
            transform: scale(1.1);
        }
        .avatar-option.selected {
            border-color: var(--accent-color);
            background-color: rgba(99, 102, 241, 0.2);
        }
    </style>
    <script type="module" src="onboarding.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
