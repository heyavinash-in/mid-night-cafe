<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Café - Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: calc(100vh - 40px);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background-color: var(--box-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(to right, rgba(99, 102, 241, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .chat-header-avatar {
            font-size: 24px;
            background-color: rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-title-group {
            flex: 1;
        }
        .chat-title {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-subtitle {
            font-size: 12px;
            color: #10b981; /* online green */
        }
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: rgba(11, 15, 25, 0.5);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }
        .chat-input-container {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            padding: 14px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .chat-input:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .send-btn {
            background: linear-gradient(135deg, var(--accent-color), #a855f7);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .send-btn:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        .send-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="window.location.href='home.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="chat-header-avatar" id="chatAvatar">👤</div>
            <div class="chat-title-group">
                <div class="chat-title" id="chatTitle">Chat Room</div>
                <div class="chat-subtitle"><span style="color: #10b981;">Online</span> • <span style="color: #6366f1; font-weight: 500;">🔒 E2EE Active</span></div>
            </div>
        </div>
        
        <div class="chat-messages" id="messagesList">
            <!-- Messages populated dynamically -->
        </div>
        
        <!-- Advanced Emoji Picker Panel -->
        <div id="emojiPicker" class="emoji-picker" style="display: none;">
            <div class="emoji-tabs">
                <button type="button" class="emoji-tab active" data-category="smileys">😀</button>
                <button type="button" class="emoji-tab" data-category="animals">🐻</button>
                <button type="button" class="emoji-tab" data-category="food">🍔</button>
                <button type="button" class="emoji-tab" data-category="travel">🚀</button>
                <button type="button" class="emoji-tab" data-category="objects">💡</button>
            </div>
            <div class="emoji-scroll-area">
                <div class="emoji-grid" id="emojiGrid">
                    <!-- Emojis will be injected here via JS based on category -->
                </div>
            </div>
        </div>
        
        <form id="chatForm" class="chat-input-container">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <button type="button" id="attachmentBtn" class="emoji-toggle-btn" style="margin-right: -4px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
            </button>
            <button type="button" id="emojiToggleBtn" class="emoji-toggle-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
            </button>
            <input type="text" id="messageInput" class="chat-input" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit" class="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: -2px;">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>
    
    <script type="module" src="chat.js"></script>
</body>
</html>
