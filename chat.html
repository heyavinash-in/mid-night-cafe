<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Café - Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Midnight Café">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            padding: 20px;
            box-sizing: border-box;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background-color: var(--box-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        @media (max-width: 600px) {
            html, body {
                padding: 0;
                margin: 0;
                overflow: hidden;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                height: 100%;
            }
            .chat-container {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                height: 100%;
                width: 100%;
                border-radius: 0;
                border: none;
            }
        }
        
        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(to right, rgba(99, 102, 241, 0.1), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0; /* Prevent header from shrinking */
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .chat-header-avatar {
            font-size: 24px;
            background-color: rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-title-group {
            flex: 1;
        }
        .chat-title {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-subtitle {
            font-size: 12px;
            color: #10b981; /* online green */
        }
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                linear-gradient(rgba(11, 15, 25, 0.85), rgba(11, 15, 25, 0.85)),
                url('chat_bg.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
        /* This pushes messages to the bottom when there are only a few */
        .chat-messages::before {
            content: '';
            flex: 1 1 auto;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }
        .message-content {
            margin-bottom: 4px;
        }
        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            user-select: none;
        }
        .message.sent .message-footer {
            color: rgba(255, 255, 255, 0.8);
        }
        .message-edited {
            font-style: italic;
            margin-right: 4px;
        }
        .status-icon {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .status-icon svg {
            width: 100%;
            height: 100%;
        }
        .status-seen {
            color: #38bdf8; /* Blue smoke tick */
        }
        .chat-input-container {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            padding: 14px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .chat-input:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .send-btn {
            background: linear-gradient(135deg, var(--accent-color), #a855f7);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .send-btn:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        .send-btn:active {
            transform: scale(0.95);
        }
        .typing-indicator {
            color: #10b981;
            font-style: italic;
        }
        .typing-dots span {
            animation: typingDots 1.4s infinite both;
            display: inline-block;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingDots {
            0% { transform: translateY(0); opacity: 0.2; }
            20% { transform: translateY(-2px); opacity: 1; }
            100% { transform: translateY(0); opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="window.location.href='home.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <div class="chat-header-avatar" id="chatAvatar">👤</div>
            <div class="chat-title-group">
                <div class="chat-title" id="chatTitle">Chat Room</div>
                <div class="chat-subtitle" id="chatSubtitle"><span style="color: #10b981;">Online</span></div>
            </div>
            <button id="startCallBtn" style="background: none; border: none; color: var(--accent-color); cursor: pointer; padding: 8px; transition: transform 0.2s;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
            </button>
        </div>
        
        <div class="chat-messages" id="messagesList">
            <!-- Messages populated dynamically -->
        </div>
        
        <!-- Advanced Emoji Picker Panel -->
        <div id="emojiPicker" class="emoji-picker" style="display: none;">
            <div class="emoji-tabs">
                <button type="button" class="emoji-tab active" data-category="smileys">😀</button>
                <button type="button" class="emoji-tab" data-category="animals">🐻</button>
                <button type="button" class="emoji-tab" data-category="food">🍔</button>
                <button type="button" class="emoji-tab" data-category="travel">🚀</button>
                <button type="button" class="emoji-tab" data-category="objects">💡</button>
            </div>
            <div class="emoji-scroll-area">
                <div class="emoji-grid" id="emojiGrid">
                    <!-- Emojis will be injected here via JS based on category -->
                </div>
            </div>
        </div>
        
        <div id="chatForm" class="chat-input-container">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <button type="button" id="attachmentBtn" class="emoji-toggle-btn" style="margin-right: -4px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
            </button>
            <button type="button" id="emojiToggleBtn" class="emoji-toggle-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
            </button>
            <button type="button" id="recordVoiceBtn" class="emoji-toggle-btn" style="color: #10b981; margin-right: 4px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            <textarea id="messageInput" class="chat-input" placeholder="Type a message..." style="resize: none; height: 24px; min-height: 24px; max-height: 120px; overflow-y: auto; padding-top: 14px; padding-bottom: 14px;" rows="1"></textarea>
            <button type="button" id="submitBtn" class="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: -2px;">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        
        <!-- Video Call Overlay -->
        <div id="videoCallOverlay" style="display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0b0f19; z-index: 1000; flex-direction: column;">
            <div style="padding: 16px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); position: absolute; top: 0; left: 0; right: 0; z-index: 1001;">
                <span id="callStatusText" style="color: white; font-weight: 500;">Calling...</span>
                <button id="endCallBtn" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer;">End</button>
            </div>
            
            <video id="remoteVideo" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
            <video id="localVideo" autoplay playsinline muted style="width: 110px; height: 160px; position: absolute; bottom: 20px; right: 20px; border-radius: 12px; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 10px 20px rgba(0,0,0,0.5); background: #000;"></video>
            
            <!-- Incoming Call Modal -->
            <div id="incomingCallModal" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30,41,59,0.95); padding: 24px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 80%; max-width: 300px; backdrop-filter: blur(10px); z-index: 1002; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
                <div style="font-size: 48px; margin-bottom: 16px; animation: bounce 1s infinite;">📞</div>
                <h3 style="margin: 0 0 8px 0; color: white;">Incoming Call</h3>
                <p id="incomingCallerName" style="color: var(--text-secondary); margin-bottom: 24px;"></p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button id="rejectCallBtn" style="flex: 1; padding: 12px; border-radius: 12px; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; font-weight: 600; cursor: pointer;">Decline</button>
                    <button id="answerCallBtn" style="flex: 1; padding: 12px; border-radius: 12px; background: #10b981; border: none; color: white; font-weight: 600; cursor: pointer;">Answer</button>
                </div>
            </div>
            <style>
                @keyframes bounce {
                    0%, 100% { transform: translateY(0); }
                    50% { transform: translateY(-10px); }
                }
            </style>
        </div>
    </div>
    
    <script type="module" src="chat.js?v=17"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
