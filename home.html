<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Café - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <link rel="apple-touch-icon" href="icon.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Midnight Café">
    <style>
        .home-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .search-container {
            position: relative;
            width: 100%;
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background-color: var(--box-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            backdrop-filter: blur(16px);
            transition: border-color 0.3s ease;
        }
        .search-input:focus {
            border-color: var(--accent-color);
        }
        
        .result-card {
            background-color: var(--box-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            display: none; /* Hidden by default */
        }
        .result-avatar {
            font-size: 64px;
            background-color: #2A3942;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .result-username {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .result-status {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 40px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <div class="header">
            <h2>Find Friends</h2>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button id="logoutBtn" style="background: none; border: 1px solid rgba(255,255,255,0.1); color: #ef4444; padding: 6px 12px; border-radius: 16px; cursor: pointer; font-size: 13px;">Logout</button>
                <div id="currentUserAvatar" style="font-size: 28px; background-color: var(--box-bg); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);">👤</div>
            </div>
        </div>
        
        <div class="search-container">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search exactly for 'yara123@'..." autocomplete="off">
        </div>
        
        <div id="searchResult" class="result-card">
            <div id="resultAvatar" class="result-avatar">🐱</div>
            <div id="resultUsername" class="result-username">yara123@</div>
            <div class="result-status">Online and looking for a chat...</div>
            <button id="requestBtn" class="login-button" style="width: auto; padding: 12px 32px; border-radius: 24px;">Send Request</button>
        </div>
        
        <div id="emptyState" class="empty-state">
            <p>No user found.</p>
        </div>
        
        <!-- Incoming Requests Section -->
        <div id="incomingRequestsContainer" style="display: none; margin-top: 24px;">
            <h3 style="font-size: 16px; color: var(--text-secondary); margin-bottom: 16px;">Incoming Requests</h3>
            <div id="requestsList" style="display: flex; flex-direction: column; gap: 12px;">
                <!-- Populated dynamically -->
            </div>
        </div>
        
        <!-- Recent Chats Section -->
        <div id="recentChatsContainer" style="margin-top: 24px;">
            <h3 style="font-size: 16px; color: var(--text-secondary); margin-bottom: 16px;">Recent Chats</h3>
            <div id="recentChatsList" style="display: flex; flex-direction: column; gap: 12px;">
                <div class="empty-state" style="display: block; margin-top: 20px;">Loading chats...</div>
            </div>
        </div>
        
    </div>

    <!-- PWA Install Popup UI -->
    <div id="pwaInstallPopup" class="pwa-popup" style="display: none;">
        <div class="pwa-popup-content">
            <img src="icon.jpg" alt="App Icon" class="pwa-icon">
            <div class="pwa-text">
                <h3>Install Midnight Café</h3>
                <p>Add to your home screen for the full app experience.</p>
            </div>
            <button id="pwaInstallBtn" class="accept-btn" style="background-color: var(--accent-color);">Install</button>
            <button id="pwaCloseBtn" class="back-btn" style="width: auto; height: auto; padding: 8px;">✕</button>
        </div>
    </div>
    
    <script type="module" src="home.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
